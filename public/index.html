<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesia National Holiday API</title>
    <style>
        :root {
            --primary: #EF4444;
            --surface: #F9FAFB;
            --text-main: #111827;
            --text-muted: #6B7280;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--surface);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            max-width: 600px;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            border-top: 5px solid var(--primary);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .endpoint-card {
            background-color: var(--surface);
            border: 1px solid #E5E7EB;
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .endpoint {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #E5E7EB;
        }
        .endpoint:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .badge {
            background-color: #10B981;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        code {
            background-color: #F3F4F6;
            color: #EF4444;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        a {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🇮🇩 Indonesia Holiday API</h1>
    <p class="subtitle">A free, fast, and auto-updating JSON API for Indonesian National & Joint Holidays.</p>

    <div class="endpoint-card">
        <div class="endpoint">
            <span class="badge">GET</span>
            <span><a href="/api" target="_blank">/api</a></span>
        </div>
        <div class="endpoint">
            <span class="badge">GET</span>
            <span><a href="/api/2026" target="_blank">/api/2026</a> (By Year)</span>
        </div>
        <div class="endpoint">
            <span class="badge">GET</span>
            <span><a href="/api/2026/04" target="_blank">/api/2026/04</a> (By Month)</span>
        </div>
    </div>

    <p>Read the full documentation and usage examples on our GitHub repository.</p>
    
    <div class="footer">
        <a href="https://github.com/naradaagastyajiwanta/indonesia-holiday-api" target="_blank">
            View Documentation on GitHub ↗
        </a>
    </div>
</div>

</body>
</html>
